<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RWE Project Map | 2026</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --rwe:       #00A19F;
    --rwe-bg:    rgba(0,161,159,0.10);
    --other:     #E9C7E2;
    --other-bg:  rgba(233,199,226,0.20);
    --panel-bg:  #ffffff;
    --panel-border: rgba(0,0,0,0.08);
    --text-primary:   #1a1d27;
    --text-secondary: #5c6078;
    --text-muted:     #8b8fa3;
  }

  body {
    font-family: 'DM Sans', -apple-system, sans-serif;
    background: #f0f1f3;
    color: var(--text-primary);
    height: 100vh;
    overflow: hidden;
  }

  #map {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 1;
  }

  .leaflet-control-zoom { display: none; }

  /* ── Panel ── */
  .panel {
    position: absolute;
    top: 16px; left: 16px;
    z-index: 1000;
    background: var(--panel-bg);
    border: 1px solid var(--panel-border);
    border-radius: 14px;
    padding: 20px;
    width: 300px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.10), 0 0 0 1px rgba(0,0,0,0.04) inset;
    backdrop-filter: blur(20px);
  }

  .panel-header { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }

  .panel-logo {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, #00A19F, #007A78);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 11px; color: white;
    letter-spacing: -0.3px; flex-shrink: 0;
  }

  .panel-title { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }

  .panel-subtitle {
    font-size: 11px; color: var(--text-muted); margin-bottom: 18px;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.5px; text-transform: uppercase;
  }

  .stats-row {
    display: flex; justify-content: space-between; align-items: center; padding: 3px 0;
  }
  .stats-label {
    font-size: 11px; color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .stats-value { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
  .stats-sub   { font-size: 12px; color: var(--text-secondary); font-family: 'JetBrains Mono', monospace; }

  .divider { height: 1px; background: var(--panel-border); margin: 14px 0; }

  .section-label {
    font-size: 10px; font-weight: 600; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.9px;
    font-family: 'JetBrains Mono', monospace; margin-bottom: 8px;
  }

  /* Developer chips */
  .dev-legend { display: flex; gap: 8px; }

  .dev-chip {
    flex: 1; display: flex; align-items: center; gap: 7px;
    padding: 8px 10px; border-radius: 9px; cursor: pointer;
    font-size: 13px; font-weight: 600;
    transition: all 0.15s ease; user-select: none;
    border: 1.5px solid transparent;
  }
  .dev-chip.rwe-chip   { background: var(--rwe-bg);   border-color: rgba(0,161,159,0.25); }
  .dev-chip.other-chip { background: var(--other-bg); border-color: rgba(200,150,195,0.30); }
  .dev-chip.inactive   { opacity: 0.32; }

  .dev-dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }

  .dev-count {
    margin-left: auto; font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--text-secondary);
  }

  /* Type filters */
  .filter-group { display: flex; flex-direction: column; gap: 3px; }

  .filter-btn {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px; border: none; border-radius: 8px;
    background: transparent; color: var(--text-primary);
    font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all 0.15s ease; text-align: left; width: 100%;
  }
  .filter-btn:hover { background: rgba(0,0,0,0.04); }
  .filter-btn.active { background: rgba(0,0,0,0.04); }
  .filter-btn.inactive .filter-icon,
  .filter-btn.inactive .filter-label,
  .filter-btn.inactive .filter-count { opacity: 0.28; }

  .filter-icon {
    width: 28px; height: 28px; border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.06); color: var(--text-secondary); flex-shrink: 0;
  }
  .filter-icon svg { width: 16px; height: 16px; }

  .filter-label { flex: 1; }
  .filter-count {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: var(--text-secondary); min-width: 20px; text-align: right;
  }

  /* Markers */
  .map-marker {
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .map-marker:hover {
    transform: scale(1.35);
    box-shadow: 0 4px 16px rgba(0,0,0,0.30), 0 0 0 3px white !important;
  }
  .map-marker svg { display: block; }

  /* Popup */
  .leaflet-popup-content-wrapper {
    background: #fff !important;
    border: 1px solid var(--panel-border) !important;
    border-radius: 12px !important;
    box-shadow: 0 12px 40px rgba(0,0,0,0.12) !important;
    color: var(--text-primary) !important;
    padding: 0 !important;
  }
  .leaflet-popup-content {
    margin: 0 !important;
    font-family: 'DM Sans', sans-serif !important;
    font-size: 13px !important; line-height: 1.5 !important;
    min-width: 210px;
  }
  .leaflet-popup-tip { background: #fff !important; }
  .leaflet-popup-close-button {
    color: var(--text-secondary) !important; font-size: 18px !important;
    padding: 6px 8px !important; top: 4px !important; right: 4px !important;
  }

  .popup-inner { padding: 14px 16px; }

  .popup-top {
    display: flex; align-items: center; gap: 6px; margin-bottom: 10px;
  }
  .popup-dev-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .popup-dev-label {
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.7px; color: var(--text-muted);
  }
  .popup-type-badge {
    display: inline-block; padding: 2px 8px; border-radius: 5px;
    font-size: 10px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.5px; background: rgba(0,0,0,0.06);
    color: var(--text-secondary); margin-bottom: 5px;
  }
  .popup-name { font-size: 14px; font-weight: 600; color: var(--text-primary); margin-bottom: 3px; }
  .popup-location { font-size: 11px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; }

  .state-tooltip {
    background: rgba(255,255,255,0.9);
    border: 1px solid var(--panel-border);
    border-radius: 6px;
    padding: 4px 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-secondary);
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }

  .leaflet-control-attribution {
    background: rgba(255,255,255,0.85) !important;
    color: var(--text-muted) !important;
    font-size: 10px !important;
    border-radius: 4px 0 0 0 !important;
  }
  .leaflet-control-attribution a { color: var(--text-secondary) !important; }

  @media (max-width: 600px) {
    .panel {
      top: auto; bottom: 0; left: 0; right: 0; width: 100%;
      border-radius: 18px 18px 0 0; padding: 16px;
      max-height: 55vh; overflow-y: auto;
    }
  }
</style>
</head>
<body>

<div id="map"></div>

<div class="panel">
  <div class="panel-header">
    <div class="panel-logo">RWE</div>
    <div class="panel-title">Project Map</div>
  </div>
  <div class="panel-subtitle">2026 Portfolio</div>

  <div class="stats-row">
    <span class="stats-label">Projects</span>
    <span class="stats-value" id="totalCount">31</span>
  </div>
  <div class="stats-row" style="margin-bottom:4px">
    <span class="stats-label">States</span>
    <span class="stats-sub" id="stateCount">—</span>
  </div>

  <div class="divider"></div>

  <div class="section-label">Developer</div>
  <div class="dev-legend">
    <div class="dev-chip rwe-chip" id="chip-rwe" onclick="toggleDev('RWE')">
      <div class="dev-dot" style="background:#00A19F"></div>
      <span>RWE</span>
      <span class="dev-count" id="rwe-count">—</span>
    </div>
    <div class="dev-chip other-chip" id="chip-other" onclick="toggleDev('Other')">
      <div class="dev-dot" style="background:#D4A8CC"></div>
      <span>Other</span>
      <span class="dev-count" id="other-count">—</span>
    </div>
  </div>

  <div class="divider"></div>

  <div class="section-label">Project Type</div>
  <div class="filter-group" id="filters"></div>
</div>

<script>
// ── Colors ──────────────────────────────────────────────────────────────

// ── Project data ─────────────────────────────────────────────────────────

// ── Type config ───────────────────────────────────────────────────────────
const TYPE_CONFIG = {
  'Solar':        { label: 'Solar',         icon: ICONS.Solar },
  'Wind':         { label: 'Wind',          icon: ICONS.Wind },
  'Wind & Solar': { label: 'Wind & Solar',  icon: ICONS['Wind & Solar'] },
  'Data Center':  { label: 'Data Center',   icon: ICONS['Data Center'] },
  'Natural Gas':  { label: 'Natural Gas',   icon: ICONS['Natural Gas'] },
  'Research':     { label: 'Research',      icon: ICONS.Research },
};

// ── Stats ─────────────────────────────────────────────────────────────────
const stateSet = new Set(PROJECTS.map(p => p.state));
document.getElementById('stateCount').textContent = stateSet.size + ' states';

const devCounts = { RWE: 0, Other: 0 };
const typeCounts = {};
PROJECTS.forEach(p => {
  devCounts[p.developer]++;
  typeCounts[p.type] = (typeCounts[p.type] || 0) + 1;
});
document.getElementById('rwe-count').textContent   = devCounts.RWE;
document.getElementById('other-count').textContent = devCounts.Other;
document.getElementById('totalCount').textContent  = PROJECTS.length;

// ── Map ───────────────────────────────────────────────────────────────────
const map = L.map('map', {
  center: [40.8, -90.5],
  zoom: 5,
  zoomControl: false,
  attributionControl: true,
});

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
  maxZoom: 19,
}).addTo(map);

// ── State shading ─────────────────────────────────────────────────────────
const SHADED_STATES = new Set([
  'Indiana','Illinois','Michigan','Iowa','Nebraska',
  'Wisconsin','Minnesota','South Dakota','Missouri'
]);

fetch('https://raw.githubusercontent.com/PublicaMundi/MappingAPI/master/data/geojson/us-states.json')
  .then(r => r.json())
  .then(data => {
    L.geoJSON(data, {
      filter: f => SHADED_STATES.has(f.properties.name),
      style: {
        fillColor:   '#00A19F',
        fillOpacity: 0.13,
        color:       '#00A19F',
        weight:      1.5,
        opacity:     0.40,
      },
      onEachFeature: (feature, layer) => {
        layer.bindTooltip(feature.properties.name, {
          permanent: false, sticky: true,
          className: 'state-tooltip',
          direction: 'center',
        });
      }
    }).addTo(map);
  });

// ── Filter state ──────────────────────────────────────────────────────────
const filterState = {
  dev:   { RWE: true, Other: true },
  types: Object.fromEntries(Object.keys(TYPE_CONFIG).map(k => [k, true])),
};

// ── Markers ───────────────────────────────────────────────────────────────
const SIZE = 36;
const allMarkers = [];

PROJECTS.forEach(p => {
  const color  = DEV_COLOR[p.developer];
  const shadow = DEV_SHADOW[p.developer];
  const svgRaw = ICONS[p.type] || ICONS.Solar;
  // Replace fill="white" with actual white; fill="currentColor" → color
  const svgHtml = svgRaw.replace(/fill="currentColor"/g, `fill="${color}"`);

  const icon = L.divIcon({
    className: '',
    html: `<div class="map-marker" style="
      width:${SIZE}px; height:${SIZE}px;
      background:${color};
      box-shadow: 0 3px 12px ${shadow}, 0 0 0 2.5px white;
    ">
      <div style="width:${Math.round(SIZE*0.58)}px; height:${Math.round(SIZE*0.58)}px; display:flex; align-items:center; justify-content:center;">
        ${svgHtml}
      </div>
    </div>`,
    iconSize:    [SIZE, SIZE],
    iconAnchor:  [SIZE/2, SIZE/2],
    popupAnchor: [0, -(SIZE/2 + 6)],
  });

  const countyLabel = p.county.includes('/') ? p.county + ' Co., ' + p.state : p.county + ' County, ' + p.state;

  const marker = L.marker([p.lat, p.lng], { icon });
  marker.bindPopup(`
    <div class="popup-inner">
      <div class="popup-top">
        <div class="popup-dev-dot" style="background:${color}"></div>
        <span class="popup-dev-label">${p.developer}</span>
      </div>
      <div class="popup-type-badge">${p.type}</div>
      <div class="popup-name">${p.name}</div>
      <div class="popup-location">${countyLabel}</div>
    </div>
  `, { maxWidth: 260 });

  marker.projectData = p;
  marker.addTo(map);
  allMarkers.push(marker);
});

// ── Developer toggle ──────────────────────────────────────────────────────
function toggleDev(dev) {
  filterState.dev[dev] = !filterState.dev[dev];
  const chipId = dev === 'RWE' ? 'chip-rwe' : 'chip-other';
  document.getElementById(chipId).classList.toggle('inactive', !filterState.dev[dev]);
  updateMarkers();
}

// ── Update visible markers ────────────────────────────────────────────────
function updateMarkers() {
  let visible = 0;
  allMarkers.forEach(m => {
    const p = m.projectData;
    const show = filterState.dev[p.developer] && filterState.types[p.type];
    if (show) { m.addTo(map); visible++; }
    else { map.removeLayer(m); }
  });
  document.getElementById('totalCount').textContent = visible;
}

// ── Type filter buttons ───────────────────────────────────────────────────
const filtersEl = document.getElementById('filters');

Object.entries(TYPE_CONFIG).forEach(([key, cfg]) => {
  const count = typeCounts[key] || 0;
  if (!count) return;

  const btn = document.createElement('button');
  btn.className = 'filter-btn active';
  btn.innerHTML = `
    <span class="filter-icon">${cfg.icon}</span>
    <span class="filter-label">${cfg.label}</span>
    <span class="filter-count">${count}</span>
  `;

  // Tint the filter icon to reflect the type's vibe using neutral gray
  btn.querySelector('.filter-icon svg').style.cssText = 'width:16px;height:16px;';

  btn.addEventListener('click', () => {
    filterState.types[key] = !filterState.types[key];
    btn.classList.toggle('active',   filterState.types[key]);
    btn.classList.toggle('inactive', !filterState.types[key]);
    updateMarkers();
  });

  filtersEl.appendChild(btn);
});
</script>
</body>
</html>
